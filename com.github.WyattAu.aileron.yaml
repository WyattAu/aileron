app-id: com.github.WyattAu.aileron
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: aileron
finish-args:
  - --share=network
  - --share=ipc
  - --device=dri
  - --socket=fallback-x11
  - --socket=wayland
  - --filesystem=home
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.llvm18
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/llvm18/bin
  env:
    CARGO_HOME: /run/build/aileron/cargo
    RUST_BACKTRACE: 1
modules:
  - name: aileron
    buildsystem: simple
    build-commands:
      - cargo --offline build --release --locked
      - install -Dm755 target/release/aileron /app/bin/aileron
    sources:
      - type: dir
        path: .
