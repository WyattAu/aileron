total_tasks = 40
v3_status = "31/38 complete (82%)"
v4_status = "40/40 unblocked complete (100%), 0 pending, 18 blocked"

# ─────────────────────────────────────────────
# Phase U: Keyboard-Driven Polish
# The core differentiator: everything accessible without a mouse.
# ─────────────────────────────────────────────

[[task]]
id = "U01"
title = "Keyboard navigation for all overlay panels"
phase = "U"
priority = "critical"
status = "done"
description = "Add j/k (or arrow keys) navigation to: history panel, tab search panel, command palette results, downloads panel. Enter to select, Escape to close. Currently these panels are mouse-only. This is the #1 usability gap for a keyboard-driven browser."
depends = []

[[task]]
id = "U02"
title = "Keybinding customization via config.toml"
phase = "U"
priority = "critical"
status = "done"
description = "Allow users to remap keybindings in config.toml. Format: [keybindings] '<C-p>' = 'command_palette', '<C-t>' = 'split_vertical'. Fall back to defaults for unmapped keys. Parse crossterm-style key notation. Validate on load, warn on conflicts."
depends = []

[[task]]
id = "U03"
title = "Mode indicator in status bar"
phase = "U"
priority = "high"
status = "done"
description = "Show current mode (Normal, Insert, Command, Hint, TabSearch) prominently in the status bar. Color-code modes. Show pending operator (e.g., 'd' waiting for motion). This is standard vim behavior that Aileron lacks."
depends = []

[[task]]
id = "U04"
title = "Omnibox frecency ranking"
phase = "U"
priority = "high"
status = "done"
description = "Replace simple history search with frecency ranking (frequency * recency). Score = visit_count / log(age_in_hours + 2). Boost bookmarks and open tabs. Deduplicate results (same URL from history + bookmark + open tab → show once). Target: typing 2-3 chars should show the right result."
depends = []

[[task]]
id = "U05"
title = "Omnibox inline bookmarks and open tabs"
phase = "U"
priority = "medium"
status = "done"
description = "When typing in the URL bar, show results from: open tabs (prefixed [tab]), bookmarks ([bm]), history ([hist]), and search suggestions ([search]). Category icons. Arrow keys to navigate, Enter to select."
depends = ["U04"]

[[task]]
id = "U06"
title = "Visual split pane resize handles"
phase = "U"
priority = "medium"
status = "done"
description = "Add drag handles on split borders in egui. Mouse drag to resize panes. Show resize cursor on hover. Complement existing keyboard resize (resize-pane command)."
depends = []

[[task]]
id = "U07"
title = "Tab reorder via drag or command"
phase = "U"
priority = "medium"
status = "done"
description = "Allow reordering tabs in the sidebar. Mouse drag or :tab-move <direction>. Update BSP tree structure accordingly."
depends = []

[[task]]
id = "U08"
title = "Undo close tab (:tab-restore)"
phase = "U"
priority = "high"
status = "done"
description = "Maintain a closed-tab stack (URL + title + position). :tab-restore reopens the last closed tab. :tab-restore N restores the Nth most recent. Stack persists within session (not across restarts)."
depends = []

# ─────────────────────────────────────────────
# Phase V: Content & Reading Features
# Features that make Aileron useful for actual browsing.
# ─────────────────────────────────────────────

[[task]]
id = "V01"
title = "Bookmarks panel (:bookmarks)"
phase = "V"
priority = "high"
status = "done"
description = "Add :bookmarks command opening an overlay panel. Show all bookmarks with titles, URLs, and folders. Click to navigate. Add :bookmark <name> to bookmark current page. DB schema exists (src/db/bookmarks.rs). Import from Firefox/Chrome."
depends = []

[[task]]
id = "V02"
title = "Bookmark folders and reordering"
phase = "V"
priority = "medium"
status = "done"
description = "Support bookmark folders. :bookmark-folder <name> to create. :bookmark <name> <folder> to file. Show folder hierarchy in bookmarks panel."
depends = ["V01"]

[[task]]
id = "V03"
title = "Reader mode (:reader)"
phase = "V"
priority = "medium"
status = "done"
description = "Inject readability-style CSS to strip page clutter. Serif font, comfortable line width, no sidebars/ads. Toggle with :reader. Persist preference per-site in site_settings."
depends = []

[[task]]
id = "V04"
title = "Per-site settings UI"
phase = "V"
priority = "medium"
status = "done"
description = "Settings page section for per-site overrides. DB schema exists (src/db/site_settings.rs). Allow configuring: zoom level, content filter level, cookie policy, JavaScript toggle, reader mode default, custom CSS injection."
depends = []

[[task]]
id = "V05"
title = "Find and replace in page"
phase = "V"
priority = "medium"
status = "done"
description = "Extend :find to support replace. :replace <old> <new>. Show match count. Replace all. Case-sensitive toggle."
depends = []

[[task]]
id = "V06"
title = "Multiple workspace support"
phase = "V"
priority = "low"
status = "done"
description = "Quick workspace switching. :ws-next / :ws-prev to cycle. :ws-switch <name> to jump. Show current workspace name in status bar. Auto-save on switch."
depends = []

# ─────────────────────────────────────────────
# Phase W: Reliability & Performance
# Making it fast, stable, and trustworthy.
# ─────────────────────────────────────────────

[[task]]
id = "W01"
title = "Web content crash recovery"
phase = "W"
priority = "critical"
status = "done"
description = "When a webview process crashes (WebKitGTK segfault, OOM), detect the crash, log it, and offer to reload the pane. Currently a webview crash leaves a blank pane with no recovery path."
depends = []

[[task]]
id = "W02"
title = "Memory management and tab unloading"
phase = "W"
priority = "high"
status = "done"
description = "Track memory per tab. When total memory exceeds threshold (configurable, default 2GB), unload least-recently-used background tabs (replace content with a placeholder). Reload on activate. Show memory usage in :memory command."
depends = []

[[task]]
id = "W03"
title = "Adaptive frame rate for background tabs"
phase = "W"
priority = "high"
status = "done"
description = "Background tabs should capture at 1-5fps (or not at all) instead of 30-60fps. Only the active tab gets full frame rate. This is partially implemented (AdaptiveQuality) but needs per-tab granularity."
depends = []

[[task]]
id = "W04"
title = "Startup time optimization"
phase = "W"
priority = "medium"
status = "done"
description = "Profile and optimize cold start time. Target: <500ms to first pixel. Defer non-critical initialization (extension loading, filter list updates, git status). Lazy-load offscreen panes."
depends = []

[[task]]
id = "W05"
title = "Graceful degradation on GPU failure"
phase = "W"
priority = "medium"
status = "done"
description = "If wgpu initialization fails (no Vulkan/GL), fall back to a pure software rendering mode or show a meaningful error dialog instead of crashing. Currently shows a terminal error message."
depends = []

[[task]]
id = "W06"
title = "Input latency measurement and optimization"
phase = "W"
priority = "medium"
status = "done"
description = "Measure key-to-visual latency. Target: <16ms for local keybindings, <50ms for web content input forwarding. Profile and optimize the input→process→render pipeline."
depends = []

