# ─────────────────────────────────────────────
# Track A: Stability Hardening
# Fix the gaps that will break daily use.
# ─────────────────────────────────────────────

[[task]]
id = "A01"
title = "Navigation failure detection and custom error page"
phase = "A"
priority = "critical"
status = "done"
depends = []

[[task]]
id = "A02"
title = "WebView crash detection and auto-reload"
phase = "A"
priority = "critical"
status = "pending"
description = "AppState has webview_crash_detected, crashed_pane_url, crashed_pane_id fields but they are NEVER populated. Detect when a wry pane stops producing frames (texture goes stale) or when the process exits. Trigger the existing :crash-reload flow automatically. Consider a watchdog timer per pane."
depends = []

[[task]]
id = "A03"
title = "Keyup event forwarding for offscreen mode"
phase = "A"
priority = "high"
status = "pending"
description = "In offscreen mode, only keydown events are forwarded (not keyup). Many form behaviors rely on keyup (autocomplete commit, drag end, focus change). Add keyup forwarding alongside the existing keydown path in main.rs."
depends = []

[[task]]
id = "A04"
title = "Popup blocker enforcement at webview level"
phase = "A"
priority = "high"
status = "pending"
description = "popup_blocker_enabled config exists but is never enforced. Register with_new_window_req_handler on the wry WebViewBuilder to block window.open() calls when the blocker is enabled."
depends = []

[[task]]
id = "A05"
title = "Cookie blocking enforcement via WebKitGTK settings"
phase = "A"
priority = "medium"
status = "pending"
description = "Per-domain cookie preferences are stored in site_settings DB but never enforced. Use WebKitGTK's cookie manager API (webkit_website_data_manager) to configure accept/no-accept policy per domain when site settings are loaded."
depends = []

[[task]]
id = "A06"
title = "Console capture for offscreen mode"
phase = "A"
priority = "medium"
status = "pending"
description = "Console capture (console.log/warn/error) only works in native wry mode. In offscreen mode, execute the CONSOLE_CAPTURE_JS initialization script after page load and add a :console command that reads the buffer via execute_js callback."
depends = []

