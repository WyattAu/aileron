title = "Tab close confirmation for unsaved forms"
phase = "B"
priority = "medium"
status = "pending"
description = "Closing a pane with form data (input/textarea with content) should warn the user. Inject JS before close to check document.querySelector('input:not(:placeholder-shown)), textarea, etc."
depends = []

[[task]]
id = "B04"
title = "Zoom indicator in status bar"
phase = "B"
priority = "low"
status = "pending"
description = "Show current zoom level in the status bar. The site_settings DB supports per-site zoom but there is no visual indicator of the current level."
depends = []

[[task]]
id = "B05"
title = "Link hint follow in new tab (middle-click / g<url>)"
phase = "B"
priority = "medium"
status = "pending"
description = "g; link hints exist but g<url> to open a specific URL in a new tab does not. Add g<url> as a command that opens the URL in a new pane. Also support Ctrl+Click to open links in new tab."
depends = []

