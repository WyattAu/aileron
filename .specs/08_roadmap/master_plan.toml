# ============================================================
# PHASE F: Architecture B — Offscreen Webview Migration
# ============================================================
# Replaces visible wry windows (XWayland hacks) with offscreen
# rendering via gtk::OffscreenWindow → pixel capture → wgpu
# texture → egui Image widget. See ADR-003 for full context.
#
# Texture sharing research (2026-04-16):
# - GL context sharing: BLOCKED (NVIDIA EGL on Wayland broken)
# - DMA-BUF import: BLOCKED (WebKitGTK has no texture export API)
# - CPU readback: ADEQUATE (~5-8ms/pane at 1080p, within 30fps budget)
# - BGRA→RGBA conversion: KEEP (egui is RGBA-only, <1ms, not a bottleneck)
# - Long-term fix: Servo ADR-002 (Oct 2026) renders to wgpu texture directly
#
# IME research (2026-04-16):
# - OffscreenWindow cannot receive native IME (no wl_surface)
# - JS synthetic composition events are ignored by WebKitGTK
# - Hybrid approach: Ime::Commit → JS execCommand, Ime::Preedit → egui status bar
# - Candidate popup positioned via window.set_ime_cursor_area()

