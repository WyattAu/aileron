# ─────────────────────────────────────────────
# Phase S: WebExtensions & Lua Deepening
# ─────────────────────────────────────────────

[[task]]
id = "S01"
title = "WebExtensions storage persistence"
phase = "S"
priority = "critical"
status = "complete"
description = "Implemented persistent storage in src/extensions/impls.rs. AileronStorageArea now supports optional JSON file backend (with_persistence). Loads on construction, writes on mutation. AileronStorageApi::with_persistence() creates 3 areas (local/sync/managed) per extension under extensions_dir/storage/<ext_id>/. Fire on_changed callbacks on set/remove/clear. 8 new tests."
depends = []

[[task]]
id = "S02"
title = "WebExtensions background scripts"
phase = "S"
priority = "critical"
status = "complete"
description = "Implement background script/service worker lifecycle. Load background.js/scripts from extension manifest. Run in isolated context with access to extension APIs. Support browser.runtime.onMessage for communication with content scripts. Handle extension enable/disable/reload lifecycle."
depends = ["S01"]

[[task]]
id = "S03"
title = "WebExtensions permissions model"
phase = "S"
priority = "high"
status = "complete"
description = "Implement optional_permissions and permissions request flow. Check manifest permissions on install: tabs, bookmarks, history, storage, webRequest, scripting, notifications. Grant/deny UI in settings. Validate API access against granted permissions at runtime."
depends = ["S01"]

[[task]]
id = "S04"
title = "WebExtensions message passing"
phase = "S"
priority = "high"
status = "complete"
description = "Implement browser.runtime.sendMessage / onMessage between content scripts and background scripts. Support one-time messages and long-lived ports (connect/connect). Serialize messages as JSON. Add to existing ExtensionContentScriptRegistry."
depends = ["S02"]

[[task]]
id = "S05"
title = "WebExtensions tabs API concrete impl"
phase = "S"
priority = "high"
status = "pending"
description = "Wire up src/extensions/tabs.rs with real AppState operations. Implement: create, update, remove, query, get, getCurrent, sendMessage, executeScript. Map TabId to internal pane IDs. Support tab events (onCreated, onUpdated, onRemoved, onActivated)."
depends = ["S01"]

[[task]]
id = "S06"
title = "WebExtensions webRequest interception"
phase = "S"
priority = "high"
status = "complete"
description = "Implement webRequest API in src/extensions/web_request.rs. Interceptor pipeline: onBeforeRequest → onBeforeSendHeaders → onSendHeaders → onHeadersReceived → onAuthRequired → onCompleted. Allow extensions to block/modify/redirect requests. Integrate with existing adblock pipeline."
depends = ["S03", "S04"]

[[task]]
id = "S07"
title = "WebExtensions scripting API"
phase = "S"
priority = "medium"
status = "complete"
description = "Implement scripting.executeScript and scripting.insertCSS. Allow extensions to programmatically inject JS/CSS into tabs. Support file-based scripts (from extension package) and code-based injection. Return execution results."
depends = ["S05"]

[[task]]
id = "S08"
title = "Lua as main control plane"
phase = "S"
priority = "high"
status = "complete"
description = "Expand Lua scripting to be the primary automation interface. Add Lua APIs for: extension management (install/enable/disable/list), tab control, download management, sync operations, keybinding overrides at runtime. Lua scripts can orchestrate WebExtensions (e.g., 'when tab loads, run extension X with config Y'). Add lua require() for loading multiple script files."
depends = ["S01", "S05"]

[[task]]
id = "S09"
title = "uBlock Origin compatibility"
phase = "S"
priority = "high"
status = "pending"
description = "Test uBlock Origin (or uBlock Origin Lite) loading and operation. Identify which WebExtensions APIs it needs. Implement any missing APIs specifically for uBO compatibility. Target: adblock-testpages.com passes all tests through uBO."
depends = ["S06", "S07"]

[[task]]
id = "S10"
title = "Extension marketplace/loading UX"
phase = "S"
priority = "medium"
status = "pending"
description = "Add extension loading UX: :extensions command to list/enable/disable/remove. Extension settings page section. Load extensions from ~/.config/aileron/extensions/<id>/. Support .xpi and .crx unpacking (zip format). Show extension permissions before install."
depends = ["S03"]

