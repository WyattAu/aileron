phase = "R"
priority = "high"
status = "pending"
description = "Implement efficient texture pipeline from Servo to egui. Use capture_screenshot() RGBA buffer → egui ColorImage → TextureHandle. Add dirty-region tracking to avoid re-capturing unchanged frames. Target: match or exceed WebKitGTK texture capture performance."
