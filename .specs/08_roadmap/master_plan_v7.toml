# ─────────────────────────────────────────────
# Track A: Extension API Completion
# Contractor requirement. Wire the full extension lifecycle.
# ─────────────────────────────────────────────

[[task]]
id = "A01"
title = "Wire content script injection into page lifecycle"
track = "A"
priority = "critical"
status = "done"
description = "On LoadStarted/LoadComplete events in offscreen_webview.rs, query content_script_registry for matching scripts and inject via evaluate_script. Handle document_start (before DOM), document_end (after DOM), document_idle (after load). Track injected scripts per pane to avoid double-injection."
depends = []

[[task]]
id = "A02"
title = "Wire web request interceptor (on_before_request)"
track = "A"
priority = "critical"
status = "done"
description = "Hook into wry's navigation handler to call fire_on_before_request() before each network request. Extension can return BlockingResponse { cancel: true } to block, or { redirect: url } to redirect. Requires threading ExtensionManager through to the wry navigation callback."
depends = []

[[task]]
id = "A03"
title = "Wire web request events (headers, redirect, complete, error)"
track = "A"
priority = "high"
status = "done"
description = "Fire on_headers_received, on_before_redirect, on_completed, on_error_occurred at appropriate points in the request lifecycle. These are notification-only (no blocking response)."
depends = ["A02"]

[[task]]
id = "A04"
title = "Wire extension messaging (runtime.sendMessage / onMessage)"
track = "A"
priority = "high"
status = "done"
description = "Bridge extension messaging to wry IPC. Content scripts call runtime.sendMessage() via injected JS → IPC → ExtensionManager message bus → registered handlers. Route responses back through IPC."
depends = ["A01"]

[[task]]
id = "A05"
title = "Wire extension storage API to persistent backend"
track = "A"
priority = "high"
status = "done"
description = "Extension storage.local.get/set/remove/clear should persist to disk in extensions_dir/storage/<extension_id>/. The AileronStorageArea already has file persistence — verify it works end-to-end with content script access."
depends = ["A01"]

[[task]]
id = "A06"
title = "Extension permission enforcement"
track = "A"
priority = "medium"
status = "done"
description = "Before executing any extension API call, check has_permission() and has_host_permission(). Deny access to APIs not listed in manifest permissions. Log permission violations."
depends = ["A01"]

[[task]]
id = "A07"
title = "Extension options page support"
track = "A"
priority = "low"
status = "done"
description = "Allow extensions to declare an options_page in manifest. Opening the options page navigates to extension://<id>/options.html served from the extension directory."
depends = ["A01"]

[[task]]
id = "A08"
title = "Builtin adblock: implement actual filter matching"
track = "A"
priority = "high"
status = "done"
description = "The builtin_adblock extension has a manifest but no blocking logic. Wire it into the web request interceptor (A02) using the existing AdBlocker engine. Load EasyList on startup. Toggle via :set adblock."
depends = ["A02"]

[[task]]
id = "A09"
title = "Extension lifecycle: install/unload/reload commands"
track = "A"
priority = "medium"
status = "done"
description = "Add :extension-install <path>, :extension-unload <id>, :extension-reload <id> commands. Allow users to manage extensions at runtime."
depends = ["A01"]

[[task]]
id = "A10"
title = "Extension tests: end-to-end content script + storage"
track = "A"
priority = "medium"
status = "done"
description = "Integration tests that: (1) load an extension with a content script, (2) navigate to a matching URL, (3) verify script injection, (4) test storage get/set persistence, (5) test message passing."
depends = ["A01", "A04", "A05"]

