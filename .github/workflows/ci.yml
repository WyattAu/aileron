name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            webkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            libsqlite3-dev \
            libvulkan-dev \
            pkg-config \
            clang

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: test-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            test-${{ runner.os }}-

      - name: Check compilation
        run: cargo check

      - name: Clippy (zero warnings)
        run: cargo clippy -- -D warnings

      - name: Run library tests
        run: AILERON_TESTING=1 cargo test --lib -- --test-threads=4

      - name: Run integration smoke test
        run: AILERON_TESTING=1 cargo test --test integration_smoke -- --test-threads=4

      - name: Run startup test
        run: AILERON_TESTING=1 cargo test --test startup_test -- --test-threads=4

      - name: Cross-compile check (x86_64-unknown-linux-gnu)
        run: cargo check --target x86_64-unknown-linux-gnu

      - name: Build release
        run: cargo build --release

  build-macos:
    name: macOS build check
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: build-macos-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            build-macos-

      - name: Check compilation
        run: cargo check

  build-windows:
    name: Windows build check
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: build-windows-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            build-windows-

      - name: Check compilation
        run: cargo check

  cross-compile:
    name: Cross-compile (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: cross-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cross-${{ matrix.target }}-

      - name: Check compilation
        run: cargo check --target ${{ matrix.target }}

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain (rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check
